<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AaharSetu Phase 4 Ecosystem</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit'] } , colors: { brand: { 50: '#ecfdf5', 500: '#10b981', 600: '#059669' } } } } };</script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass-panel { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        .high-contrast { filter: contrast(1.6) brightness(1.1); background: #000 !important; color: #fff !important; }
        .high-contrast .glass-panel { background: rgba(50,50,50,0.95); border-color: #fff; }
        .quick-btn { @apply bg-gradient-to-r from-brand-500 to-emerald-500 text-white py-2 px-4 rounded-xl font-medium text-sm shadow-lg hover:shadow-xl transition-all; }
        #streakChart { height: 140px; }
    </style>
</head>
<body class="bg-gradient-to-br from-brand-50 to-emerald-100 min-h-screen p-4 text-slate-800">
    <main class="glass-panel max-w-md mx-auto rounded-3xl flex flex-col h-[95vh] shadow-2xl overflow-hidden">
        
        <header class="p-4 border-b bg-white/50 flex items-center justify-between">
            <div class="flex gap-3 items-center">
                <div class="h-10 w-10 bg-gradient-to-tr from-brand-500 to-emerald-400 rounded-2xl flex items-center justify-center text-white shadow-lg">🍽️</div>
                <h1 class="font-bold text-lg">AaharSetu v4.0</h1>
            </div>
            <div class="flex gap-2">
                <button id="highContrastBtn" aria-label="High contrast" class="p-2 rounded-lg hover:bg-slate-200">HC</button>
                <select id="langSelect" aria-label="Language" class="border rounded p-1 text-sm">
                    <option>EN</option>
                    <option>मराठी</option>
                    <option>हिंदी</option>
                </select>
                <button id="groceryBtn" class="quick-btn text-xs px-2" aria-label="Grocery list">🛒 List</button>
                <button onclick="quickAction('donate')" class="quick-btn text-xs px-2" aria-label="Donate excess">♻️ Donate</button>
            </div>
        </header>

        <section id="contextDashboard" class="p-3 border-b" aria-label="Context" role="region">
            <h2 class="text-xs uppercase font-semibold mb-2 px-1 tracking-wide">Context</h2>
            <div id="dashboardItems" class="grid grid-cols-2 gap-2 text-sm font-medium"></div>
        </section>

        <section class="p-3 border-b" aria-label="Quick actions" role="toolbar">
            <h3 class="text-xs uppercase font-semibold mb-3 px-1 tracking-wide">Actions</h3>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="quickAction('hydration')" class="quick-btn" aria-label="Hydration">💧 Hydration</button>
                <button onclick="quickAction('spots')" class="quick-btn" aria-label="Spots">📍 Spots</button>
                <button onclick="quickAction('budget')" class="quick-btn" aria-label="Budget">💰 Budget</button>
            </div>
        </section>

        <section class="p-3 border-b bg-gradient-to-r from-green-50 to-blue-50" aria-label="Nutrition streak" role="img">
            <div class="flex justify-between mb-2">
                <h3 class="text-sm font-semibold">Streak</h3>
                <button onclick="logMeal()" class="text-xs bg-brand-500 text-white px-3 py-1 rounded-full shadow" aria-label="Log meal">Log</button>
            </div>
            <canvas id="streakChart" aria-label="7-day nutrition streak line chart, green high healthy."></canvas>
        </section>

        <div id="chatBox" class="flex-1 p-4 overflow-y-auto gap-4 flex flex-col" style="scroll-behavior:smooth;"></div>

        <div class="p-3 bg-white/70 border-t">
            <div id="imagePreviewContainer" class="hidden mb-3">
                <div class="relative">
                    <img id="imagePreview" src="" alt="Preview" class="h-20 w-20 rounded-xl border-2 shadow object-cover">
                    <div id="removeImageBtn" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center cursor-pointer shadow-lg" aria-label="Remove">×</div>
                </div>
            </div>
            <form id="chatForm" class="flex gap-2 items-end">
                <label for="imageInput" class="p-2 hover:bg-slate-100 rounded-full cursor-pointer text-slate-400 hover:text-brand-500" aria-label="Upload">
                    📷
                </label>
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <textarea id="textInput" placeholder="Meal or query..." class="flex-1 border rounded-3xl p-3 resize-none max-h-24" oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"></textarea>
                <button type="submit" id="sendBtn" class="bg-brand-500 text-white p-3 rounded-full shadow-lg hover:bg-brand-600" aria-label="Send">➤</button>
            </form>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
